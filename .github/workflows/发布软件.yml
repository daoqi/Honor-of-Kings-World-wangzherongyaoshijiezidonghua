name: 发布新版本

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      # 1. 升级 actions/checkout 到 v6
      - uses: actions/checkout@v6

      # 2. 升级 actions/setup-python 到 v6
      - name: 设置 Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install pyinstaller torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install ultralytics PyQt5 pywin32 opencv-python pillow keyboard pyperclip mss pyautogui

      # 3. 在打包前，强制调整导入顺序（关键步骤）
      - name: 修复 main.py 导入顺序
        run: |
          $content = Get-Content main.py -Raw
          $newContent = "import torch`nimport sys`nsys.modules['onnx'] = None`nsys.modules['onnxruntime'] = None`nsys.modules['onnxslim'] = None`n`n" + $content
          $newContent | Set-Content main.py -Encoding UTF8

      - name: 写入版本号
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          "version = `"$ver`"" | Out-File version.py -Encoding UTF8

      # 4. 确保打包时排除冲突模块
      - name: PyInstaller 打包
        run: |
          pyinstaller --onefile --windowed --name HOKAI --icon logo.ico --collect-all torch --collect-all ultralytics --exclude-module onnx --exclude-module onnxruntime --exclude-module tensorboard main.py

      - name: 上传 exe 到 Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/HOKAI.exe
          body: "自动打包版本 ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}